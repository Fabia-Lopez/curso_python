{%- extends "base.html" -%}
{%- block title -%}Libra Online Library - Search by Title{%- endblock -%}
{%- block body -%}
<h1>Search by Year</h1>
<form action="/browse_by_year" method="post">
    <label for="year">Year:</label>
    <input type="text" id="year" name="year" required>
    <input type="submit" value="Search">
</form>
<ul>
    {% for book in books_list %}
    <li><a href="/book/{{ book.id }}">{{ book.title }}</a> by {{ book.author }}</li>
    {% endfor %}
</ul>
{% endblock %}
