{%- extends "base.html" -%}
{%- block title -%}Libra Online Library - Search by Title{%- endblock -%}
{%- block body -%}
<h1>Search by Genre</h1>
<form action="/browse_by_genre" method="post">
    <label for="genre">Genre:</label>
    <input type="text" id="genre" name="genre">
    <input type="submit" value="Search">
</form>
<ul>
    {% for book in books_list %}
    <li><a href="/book/{{ book.id }}">{{ book.title }}</a> by {{ book.author }}</li>
    {% endfor %}
</ul>
{% endblock %}
